[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vespwood-google"
version = "1.0.9"
description = "Google GenAI integration for Vespwood"
license = {text = "Apache"}
readme = "README.md"
requires-python = ">=3.12.0,<4.0.0"
dependencies = [
    "vespwood-generator",
    "google-genai"
]

[project.optional-dependencies]
yaml = [
    "vespwood[yaml]"
]

[project.urls]
Homepage = "https://vespwood.com"
Repository = "https://github.com/ayush-suman/vesp.git"

[tool.hatch.build.targets.wheel]
packages = ["src/vespwood_google"]