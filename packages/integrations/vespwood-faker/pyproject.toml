[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vespwood-faker"
version = "1.0.10"
description = "Fake generator for Vespwood"
license = {text = "Apache"}
readme = "README.md"
requires-python = ">=3.11.0,<4.0.0"
dependencies = [
    "vespwood-generator",
    "jsf"
]


[project.urls]
Homepage = "https://vespwood.com"
Repository = "https://github.com/ayush-suman/vesp.git"

[tool.hatch.build.targets.wheel]
packages = ["src/vespwood_openai"]